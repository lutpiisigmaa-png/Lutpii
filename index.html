<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gojo Split Center</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', -apple-system, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            height: 100vh; width: 100vw;
            overflow: hidden; 
            background: #000; /* Dasar fallback */
        }

        /* --- THE REAL SPLIT SCREEN MAGIC --- */
        .split-wrapper {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; 
            height: calc(100vh - 65px); /* Sisa buat bottom bar */
            overflow: hidden;
        }

        /* RIGHT PANEL (WHITE MODE - COMMANDER) */
        /* Berada di layer bawah, ukurannya fix 100vw (Full Screen) */
        .panel-right {
            position: absolute;
            top: 0; left: 0;
            width: 100vw; height: 100%;
            background: #f7f7f9;
            color: #111113;
            z-index: 1;
        }

        /* LEFT PANEL (BLACK MODE - SURVIVAL) */
        /* Berada di layer atas, ukurannya berubah-ubah pake persentase */
        .panel-left {
            position: absolute;
            top: 0; left: 0;
            width: 50%; /* Default awal */
            height: 100%;
            background: #050505;
            color: #fcfcfc;
            z-index: 2;
            overflow: hidden; /* Motong konten inner yang kelebihan */
            border-right: 2px solid rgba(255, 255, 255, 0.1);
        }

        /* INNER CONTENT WRAPPER */
        /* Ini kunci biar konten GAK KEGENCET. Fix 100vw! */
        .inner-content {
            width: 100vw;
            height: 100%;
            padding: 30px 20px;
            overflow-y: auto;
            /* Layouting dalam panel */
            display: grid;
            grid-template-columns: 50vw 50vw;
        }

        /* Khusus buat penempatan konten di kanan */
        .content-commander {
            grid-column: 2;
            padding-right: 20px;
            padding-left: 20px;
        }

        .content-survival {
            grid-column: 1;
            padding-right: 20px;
        }

        /* --- SLIDER GOJO --- */
        .divider {
            position: absolute;
            left: 50%; top: 0; bottom: 0;
            width: 0px; 
            z-index: 10;
            cursor: ew-resize;
            display: flex; align-items: center; justify-content: center;
        }

        /* Gambar Pegangan Slider */
        .gojo-handle {
            width: 45px; height: 45px;
            border-radius: 50%;
            background-image: url('https://i.pinimg.com/736x/87/40/a0/8740a0499e900c144fb6b00ec5961e93.jpg'); /* FOTO GOJO (Bisa lu ganti linknya) */
            background-size: cover;
            background-position: center;
            border: 3px solid #fff;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: transform 0.2s;
        }
        .divider:active .gojo-handle { transform: scale(1.1); }

        /* --- STYLING KONTEN --- */
        .panel-title { font-size: 28px; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }
        .title-survival::before { content: ''; width: 5px; height: 28px; background: #ff4d4d; border-radius: 3px; }
        .title-commander::before { content: ''; width: 5px; height: 28px; background: #1fffc1; border-radius: 3px; }

        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 25px; }
        
        /* Input Field (Hitam/Putih menyesuaikan) */
        .panel-left input { background: #1a1a1e; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 12px; font-size: 14px; outline: none; }
        .panel-right input { background: #e5e7eb; border: 1px solid #d1d5db; color: #000; padding: 15px; border-radius: 12px; font-size: 14px; outline: none; }

        .btn-add { padding: 14px; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; text-transform: uppercase; font-size: 12px; }
        .btn-survival { background: #ff4d4d; color: #fff; }
        .btn-commander { background: #0d9488; color: #fff; } /* Teal gelap biar kontras di putih */

        /* Task Cards */
        .task-list { list-style: none; }
        .task-card { 
            border-radius: 16px; padding: 18px; margin-bottom: 12px; 
            display: flex; justify-content: space-between; align-items: flex-start;
        }
        .panel-left .task-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); }
        .panel-right .task-card { background: #fff; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        
        .task-text { font-size: 14px; font-weight: 600; margin-bottom: 5px; line-height: 1.4; }
        .task-date { font-size: 11px; opacity: 0.6; }
        
        .btn-check { background: transparent; border: 2px solid; width: 24px; height: 24px; border-radius: 6px; cursor: pointer; color: transparent; }
        .panel-left .btn-check { border-color: rgba(255,255,255,0.3); }
        .panel-right .btn-check { border-color: rgba(0,0,0,0.2); }

        /* --- BOTTOM TAB BAR --- */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 65px;
            display: flex; align-items: center; justify-content: space-around;
            background: #111113; /* Netral gelap */
            border-top: 1px solid #222; z-index: 100;
        }
        .tab-item {
            background: transparent; border: none; color: #6b7280;
            font-size: 10px; font-weight: 700; display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; text-transform: uppercase;
        }
        .tab-item.active { color: #fff; }
        .icon { width: 22px; height: 22px; fill: currentColor; }

        /* --- OTHER VIEWS (BOARD & HISTORY) --- */
        .view-main .split-wrapper { display: block; }
        .view-board .split-wrapper, .view-history .split-wrapper { display: none; }
        
        .other-views { display: none; padding: 30px 20px; height: calc(100vh - 65px); overflow-y: auto; background: #050505; color: #fff; }
        .view-board .board-area, .view-history .history-area { display: block; }

        .other-views h1 { font-size: 28px; font-weight: 800; margin-bottom: 20px; }

        /* UPGRADED BOARD GRID */
        .board-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .board-card {
            background: #1a1a1e; border: 1px solid #333; border-radius: 16px;
            padding: 18px; display: flex; flex-direction: column; justify-content: space-between; min-height: 140px;
        }
        .board-text { font-size: 13px; font-weight: 600; line-height: 1.5; margin-bottom: 15px;}
        .board-footer { display: flex; justify-content: space-between; align-items: center; }
        .board-tag { font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: 6px; text-transform: uppercase; }
        .tag-survival { background: rgba(255, 77, 77, 0.2); color: #ff4d4d; }
        .tag-commander { background: rgba(31, 255, 193, 0.2); color: #1fffc1; }
    </style>
</head>
<body class="view-main">

    <div class="split-wrapper" id="split-wrapper">
        
        <div class="panel-right">
            <div class="inner-content">
                <div class="content-commander">
                    <h2 class="panel-title title-commander">Commander</h2>
                    <div class="input-group">
                        <input type="text" id="commander-input" placeholder="Ide liar buat Markaz/Web?">
                        <button class="btn-add btn-commander" onclick="addNote('commander')">Simpan Ide</button>
                    </div>
                    <ul class="task-list" id="commander-list"></ul>
                </div>
            </div>
        </div>

        <div class="panel-left" id="panel-left">
            <div class="inner-content">
                <div class="content-survival">
                    <h2 class="panel-title title-survival">Survival</h2>
                    <div class="input-group">
                        <input type="text" id="survival-input" placeholder="Apa darurat minggu ini?">
                        <button class="btn-add btn-survival" onclick="addNote('survival')">Tambah Prioritas</button>
                    </div>
                    <ul class="task-list" id="survival-list"></ul>
                </div>
            </div>
        </div>

        <div class="divider" id="drag-divider">
            <div class="gojo-handle"></div>
        </div>

    </div>

    <div class="other-views board-area">
        <h1>Brainstorm Board</h1>
        <div class="board-grid" id="board-grid"></div>
    </div>

    <div class="other-views history-area">
        <h1>Log History</h1>
        <ul class="task-list" id="history-list"></ul>
    </div>

    <div class="tab-bar">
        <button class="tab-item active" onclick="switchView('main', this)">
            <svg class="icon" viewBox="0 0 24 24"><path d="M14 10H3v2h11v-2zm0-4H3v2h11V6zm4 8.29L16.29 13l-1.42 1.41L16.59 16l-1.72 1.71 1.42 1.41L18 17.41l1.71 1.71 1.41-1.41L19.41 16l1.71-1.71-1.41-1.41L18 14.29zM3 16h11v-2H3v2z"></path></svg>
            Notes
        </button>
        <button class="tab-item" onclick="switchView('board', this)">
            <svg class="icon" viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"></path></svg>
            Board
        </button>
        <button class="tab-item" onclick="switchView('history', this)">
            <svg class="icon" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"></path></svg>
            History
        </button>
    </div>

    <script>
        // DATA STATE
        let tasks = JSON.parse(localStorage.getItem('entj_v3')) || [
            { id: 1, type: 'survival', text: 'Ujian lusa! Review materi.', date: '20 Jun 2026' },
            { id: 2, type: 'commander', text: 'Ide: Template visual markaz.', date: '20 Jun 2026' }
        ];

        // SPLIT SCREEN DRAG LOGIC
        const divider = document.getElementById('drag-divider');
        const leftPanel = document.getElementById('panel-left');
        const wrapper = document.getElementById('split-wrapper');
        let isDragging = false;

        const startDrag = () => { isDragging = true; };
        const stopDrag = () => { isDragging = false; };
        
        const drag = (e) => {
            if (!isDragging) return;
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let percent = (clientX / wrapper.offsetWidth) * 100;

            // Batas drag biar gak hilang keluar layar
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;

            leftPanel.style.width = `${percent}%`;
            divider.style.left = `${percent}%`;
        };

        divider.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', stopDrag);
        divider.addEventListener('touchstart', startDrag);
        document.addEventListener('touchmove', drag);
        document.addEventListener('touchend', stopDrag);

        // NAVIGATION
        function switchView(view, tabEl) {
            document.body.className = `view-${view}`;
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            tabEl.classList.add('active');
            renderData();
        }

        // CRUD
        function addNote(type) {
            const inputEl = document.getElementById(`${type}-input`);
            const text = inputEl.value.trim();
            if (!text) return;

            const dateStr = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            tasks.push({ id: Date.now(), type, text, date: dateStr });
            inputEl.value = '';
            
            localStorage.setItem('entj_v3', JSON.stringify(tasks));
            renderData();
        }

        function checkTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('entj_v3', JSON.stringify(tasks));
            renderData();
        }

        // RENDER UI
        function renderData() {
            const listSurv = document.getElementById('survival-list');
            const listCmd = document.getElementById('commander-list');
            const gridBoard = document.getElementById('board-grid');
            const listHist = document.getElementById('history-list');

            listSurv.innerHTML = ''; listCmd.innerHTML = ''; gridBoard.innerHTML = ''; listHist.innerHTML = '';

            tasks.forEach(task => {
                const cardHtml = `
                    <li class="task-card">
                        <div>
                            <p class="task-text">${task.text}</p>
                            <span class="task-date">${task.date}</span>
                        </div>
                        <button class="btn-check" onclick="checkTask(${task.id})">✓</button>
                    </li>`;

                if (task.type === 'survival') listSurv.innerHTML += cardHtml;
                if (task.type === 'commander') listCmd.innerHTML += cardHtml;
                listHist.innerHTML += cardHtml;

                const tag = task.type === 'survival' ? '<span class="board-tag tag-survival">Urgent</span>' : '<span class="board-tag tag-commander">Idea</span>';
                gridBoard.innerHTML += `
                    <div class="board-card">
                        <p class="board-text">${task.text}</p>
                        <div class="board-footer">${tag}</div>
                    </div>`;
            });
        }

        renderData();
    </script>
</body>
</html>
