<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kamera Web Pintar Luthfi</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #0A2540; /* Warna background dark blue estetik */
            margin: 0;
        }
        canvas {
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            transform: scaleX(-1); /* Efek cermin */
        }
    </style>
</head>
<body>

    <video id="video" style="display:none;"></video>
    <canvas id="canvas" width="640" height="480"></canvas>

    <script>
        const videoElement = document.getElementById('video');
        const canvasElement = document.getElementById('canvas');
        const canvasCtx = canvasElement.getContext('2d');

        // Inisialisasi MediaPipe Hands
        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});

        hands.setOptions({
            maxNumHands: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        // Proses saat tangan terdeteksi
        hands.onResults((results) => {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            
            // Default: tidak ada efek blur
            canvasCtx.filter = 'none';
            
            let peaceSign = false;

            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const lm = results.multiHandLandmarks[0];
                
                // Deteksi gaya "Peace"
                const indexUp = lm[8].y < lm[6].y;
                const middleUp = lm[12].y < lm[10].y;
                const ringDown = lm[16].y > lm[14].y;
                const pinkyDown = lm[20].y > lm[18].y;

                if (indexUp && middleUp && ringDown && pinkyDown) {
                    peaceSign = true;
                }
            }

            // Kalau peace terdeteksi, aktifkan efek blur
            if (peaceSign) {
                canvasCtx.filter = 'blur(15px)';
            }

            // Gambar video ke canvas
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.restore();
        });

        // Nyalakan Kamera
        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 640,
            height: 480
        });
        camera.start();
    </script>
</body>
</html>
