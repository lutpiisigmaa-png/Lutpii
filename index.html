<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ENTJ Command Center v2.0 - Gojo Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap');

        /* CSS VARIABLES: THEME BASE (DARK MODE - INFINITE VOID) */
        :root {
            --bg-body: #050505;
            --text-main: #fcfcfc;
            --text-muted: #88888a;
            --panel-survival-bg: linear-gradient(180deg, rgba(30,30,30,0.6) 0%, rgba(10,10,10,0.4) 100%);
            --panel-commander-bg: linear-gradient(180deg, rgba(30,30,30,0.6) 0%, rgba(10,10,10,0.4) 100%);
            --accent-survival: #ff4d4d; /* Red Accent */
            --accent-commander: #1fffc1; /* Teal Accent */
            --card-bg: rgba(255, 255, 255, 0.05);
            --border-color: rgba(255, 255, 255, 0.1);
            --slider-color: #fcfcfc;
            --tab-bar-bg: rgba(20, 20, 22, 0.85);
            --input-bg: #1a1a1e;
        }

        /* LIGHT MODE VARIABLES (REVERSE CURSED TECHNIQUE - WHITE) */
        .light-theme {
            --bg-body: #f7f7f9;
            --text-main: #111113;
            --text-muted: #6b7280;
            --panel-survival-bg: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(240,240,245,0.5) 100%);
            --panel-commander-bg: linear-gradient(180deg, rgba(255,255,255,0.7) 0%, rgba(240,240,245,0.5) 100%);
            --accent-survival: #ef4444;
            --accent-commander: #0d9488;
            --card-bg: rgba(0, 0, 0, 0.03);
            --border-color: rgba(0, 0, 0, 0.08);
            --slider-color: #111113;
            --tab-bar-bg: rgba(255, 255, 255, 0.9);
            --input-bg: #e5e7eb;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Inter', -apple-system, system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* Fix gap issue */
            display: flex;
            transition: background-color 0.4s ease;
        }

        /* GLOBAL HEADER (TOP BAR) */
        header {
            position: fixed; top: 0; left: 0; width: 100%; height: 50px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; border-bottom: 1px solid var(--border-color);
            background: rgba(var(--bg-body), 0.8); backdrop-filter: blur(5px);
            z-index: 100;
        }

        header h1 { font-size: 16px; font-weight: 800; letter-spacing: -0.5px; }
        
        .header-actions { display: flex; gap: 10px; align-items: center; }
        
        /* THEME TOGGLE BUTTON */
        .theme-toggle {
            background: transparent; border: 1px solid var(--border-color);
            color: var(--text-main); font-size: 14px; padding: 5px 10px;
            border-radius: 20px; cursor: pointer; font-weight: 600;
        }

        /* SPLIT CONTAINER (The Real Deal) */
        .split-container {
            position: absolute; top: 50px; bottom: 60px; /* Space for Top/Bottom bars */
            left: 0; width: 100vw; display: flex;
        }

        /* LIQUID GLASS PANEL */
        .panel {
            position: absolute; top: 0; bottom: 0;
            overflow-y: auto; padding: 25px 15px;
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            transition: transform 0.05s linear; /* Smooth drag */
        }

        .panel-survival {
            left: 0; width: 50%; /* Default */
            background: var(--panel-survival-bg);
            border-right: 1px solid var(--border-color);
        }

        .panel-commander {
            right: 0; width: 50%; /* Default */
            background: var(--panel-commander-bg);
        }

        /* MINIMALIST VISUAL SLIDER */
        .divider {
            position: absolute; left: 50%; top: 0; bottom: 0;
            width: 1px; background: rgba(var(--slider-color), 0.2);
            z-index: 50; cursor: col-resize; touch-action: none;
            display: flex; align-items: center; justify-content: center;
        }

        /* The Draggable Pill like the video */
        .drag-pill {
            width: 6px; height: 70px; background: var(--slider-color);
            border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.5);
            transition: transform 0.2s ease, width 0.2s ease;
        }

        .divider:hover .drag-pill, .divider:active .drag-pill {
            transform: scaleX(1.3); width: 8px;
        }

        /* PANEL CONTENT STYLING */
        .panel-header {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px;
        }

        .panel-title {
            font-size: 24px; font-weight: 800; letter-spacing: -1px;
            display: flex; align-items: center; gap: 8px;
        }

        .panel-survival .panel-title::before { content: ''; display: inline-block; width: 5px; height: 24px; background: var(--accent-survival); border-radius: 3px; }
        .panel-commander .panel-title::before { content: ''; display: inline-block; width: 5px; height: 24px; background: var(--accent-commander); border-radius: 3px; }

        .sub-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; }

        /* INPUT AREA (Dimana idenya kampang - DISINI!) */
        .input-group {
            display: flex; flex-direction: column; gap: 8px;
            margin-bottom: 20px;
        }

        input[type="text"] {
            width: 100%; background-color: var(--input-bg);
            border: 1px solid var(--border-color); color: var(--text-main);
            padding: 14px; border-radius: 12px; font-size: 14px; outline: none;
        }

        .btn-add {
            width: 100%; padding: 12px; border-radius: 12px;
            border: none; color: #fff; font-weight: 700;
            cursor: pointer; text-transform: uppercase; font-size: 12px;
            transition: filter 0.2s ease;
        }

        .panel-survival .btn-add { background-color: var(--accent-survival); }
        .panel-commander .btn-add { background-color: var(--accent-commander); }
        .btn-add:active { filter: brightness(0.9); }

        /* MINIMALIST TASK CARDS */
        .task-list { list-style: none; }
        
        .task-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 16px; padding: 18px; margin-bottom: 12px;
            display: flex; align-items: flex-start; justify-content: space-between;
            gap: 10px; transition: transform 0.2s ease;
        }
        
        .task-card:active { transform: scale(0.98); }

        .task-content { flex: 1; }
        .task-text { font-size: 14px; font-weight: 600; line-height: 1.4; margin-bottom: 4px; }
        .task-date { font-size: 11px; color: var(--text-muted); }

        .btn-check {
            background: transparent; border: 2px solid var(--border-color);
            width: 22px; height: 22px; border-radius: 6px; cursor: pointer;
            color: transparent; display: flex; align-items: center; justify-content: center;
        }

        .panel-survival .task-card .btn-check:active { border-color: var(--accent-survival); color: var(--accent-survival); }
        .panel-commander .task-card .btn-check:active { border-color: var(--accent-commander); color: var(--accent-commander); }

        /* BOTTOM TAB BAR (Kocag Tuh kayak Digambar) */
        .tab-bar {
            position: fixed; bottom: 0; left: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: space-around;
            padding: 0 20px; border-top: 1px solid var(--border-color);
            background: var(--tab-bar-bg); backdrop-filter: blur(5px);
            z-index: 100;
        }

        .tab-item {
            background: transparent; border: none; color: var(--text-muted);
            font-size: 11px; font-weight: 600; display: flex;
            flex-direction: column; align-items: center; gap: 4px;
            cursor: pointer; text-transform: uppercase;
        }

        /* Minimal Icons from Video */
        .icon { width: 18px; height: 18px; fill: currentColor; }

        .tab-item.active { color: var(--text-main); }
        .panel-survival .tab-item.active { color: var(--accent-survival); }
        .panel-commander .tab-item.active { color: var(--accent-commander); }

        /* VIEW MODES (Hide panels based on active tab) */
        .view-main .split-container { display: flex; }
        .view-board .split-container, .view-history .split-container { display: none; }
        
        .other-views { display: none; padding: 50px 15px 60px 15px; overflow-y: auto; height: 100vh; width: 100vw;}
        .view-board .board-area, .view-history .history-area { display: block; }

        /* BRAINSTORM BOARD GRID (v45) */
        .board-area h1, .history-area h1 { margin-bottom: 20px; font-size: 24px; font-weight: 800;}
        
        .board-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .board-card {
            background-color: var(--card-bg); border: 1px solid var(--border-color);
            border-radius: 12px; padding: 15px; height: 140px;
            display: flex; flex-direction: column; justify-content: space-between;
        }
        
        .board-text { font-size: 13px; font-weight: 600; line-height: 1.4; color: var(--text-main);
                      overflow: hidden; text-overflow: ellipsis; display: -webkit-box; -webkit-line-clamp: 5; -webkit-box-orient: vertical;}
        
        .board-tag { font-size: 10px; color: #fff; padding: 3px 6px; border-radius: 4px; font-weight: 700;}
        .tag-creative { background-color: #3b82f6;}
        .tag-tech { background-color: var(--accent-commander);}

    </style>
</head>
<body class="view-main">

    <header>
        <h1>COMMAND CENTER</h1>
        <div class="header-actions">
            <button class="theme-toggle" onclick="toggleTheme()">DARK</button>
            <span class="sub-label">ENTJ</span>
        </div>
    </header>

    <div class="split-container" id="split-container">
        
        <div class="panel panel-survival" id="panel-left">
            <div class="panel-header">
                <h2 class="panel-title">Survival</h2>
                <span class="sub-label">Notes</span>
            </div>

            <div class="input-group">
                <input type="text" id="survival-input" placeholder="Apa darurat minggu ini, Komandan?">
                <button class="btn-add" onclick="addNote('survival')">Tambah Prioritas</button>
            </div>

            <ul class="task-list" id="survival-list">
                </ul>
        </div>

        <div class="divider" id="drag-divider">
            <div class="drag-pill"></div>
        </div>

        <div class="panel panel-commander" id="panel-right">
            <div class="panel-header">
                <h2 class="panel-title">Commander</h2>
                <span class="sub-label">Ide / Web</span>
            </div>

            <div class="input-group">
                <input type="text" id="commander-input" placeholder="Ide liar buat Markaz/Web?">
                <button class="btn-add" onclick="addNote('commander')">Simpan Ide</button>
            </div>

            <ul class="task-list" id="commander-list">
                </ul>
        </div>

    </div>

    <div class="other-views board-area">
        <h1>Brainstorm Board</h1>
        <div class="board-grid" id="board-grid">
            </div>
    </div>

    <div class="other-views history-area">
        <h1>Log History</h1>
        <ul class="task-list" id="history-list">
            </ul>
    </div>

    <div class="tab-bar">
        <button class="tab-item active" onclick="switchView('main', this)">
            <svg class="icon" viewBox="0 0 24 24"><path d="M14 10H3v2h11v-2zm0-4H3v2h11V6zm4 8.29L16.29 13l-1.42 1.41L16.59 16l-1.72 1.71 1.42 1.41L18 17.41l1.71 1.71 1.41-1.41L19.41 16l1.71-1.71-1.41-1.41L18 14.29zM3 16h11v-2H3v2z"></path></svg>
            Notes
        </button>
        <button class="tab-item" onclick="switchView('board', this)">
            <svg class="icon" viewBox="0 0 24 24"><path d="M4 11h5V5H4v6zm0 7h5v-6H4v6zm6 0h5v-6h-5v6zm6 0h5v-6h-5v6zm-6-7h5V5h-5v6zm6-6v6h5V5h-5z"></path></svg>
            Board
        </button>
        <button class="tab-item" onclick="switchView('history', this)">
            <svg class="icon" viewBox="0 0 24 24"><path d="M13 3c-4.97 0-9 4.03-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42C8.27 19.99 10.51 21 13 21c4.97 0 9-4.03 9-9s-4.03-9-9-9zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"></path></svg>
            History
        </button>
    </div>

    <script>
        // --- DATA & STATE ---
        let currentTheme = localStorage.getItem('entj_theme') || 'dark';
        let tasks = JSON.parse(localStorage.getItem('entj_tasks_v2')) || [
            { id: 1, type: 'survival', text: 'Ujian lusa! Fokus ngerjain ringkasan materi sore ini.', date: '20 Jun 2026' },
            { id: 2, type: 'commander', text: 'Ide: Buat template visual konten markaz biar tim media ga bingung.', date: '20 Jun 2026' }
        ];

        const container = document.getElementById('split-container');
        const divider = document.getElementById('drag-divider');
        const leftPanel = document.getElementById('panel-left');
        const rightPanel = document.getElementById('panel-right');
        const body = document.body;

        // --- THEME & INIT ---
        function toggleTheme() {
            currentTheme = (currentTheme === 'dark' ? 'light' : 'dark');
            body.classList.toggle('light-theme', currentTheme === 'light');
            document.querySelector('.theme-toggle').innerText = currentTheme.toUpperCase();
            localStorage.setItem('entj_theme', currentTheme);
        }

        if (currentTheme === 'light') toggleTheme(); // Set initial theme

        // --- SPLIT SCREEN LOGIC (Smoother, Gap Fixed) ---
        let isDragging = false;
        let startPercent = 50; // Initial

        const startDrag = (e) => { isDragging = true; body.style.cursor = 'ew-resize'; };
        const stopDrag = () => { isDragging = false; body.style.cursor = 'default'; };
        
        const drag = (e) => {
            if (!isDragging) return;
            
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let percent = (clientX / container.offsetWidth) * 100;

            // Boundaries for full screen without gap
            if (percent < 0) percent = 0;
            if (percent > 100) percent = 100;

            // Applying sizes directly to width/left for smooth, no-gap feel
            leftPanel.style.width = `${percent}%`;
            divider.style.left = `${percent}%`;
            
            // Adjust content padding based on split percentage (satisfying visual)
            let creativeOpacity = Math.max(0.2, (percent - 20) / 30);
            let techOpacity = Math.max(0.2, (100 - percent - 20) / 30);
            leftPanel.style.opacity = creativeOpacity;
            rightPanel.style.opacity = techOpacity;
        };

        // Event Listeners for Split Screen
        divider.addEventListener('mousedown', startDrag);
        document.addEventListener('mousemove', drag);
        document.addEventListener('mouseup', stopDrag);
        divider.addEventListener('touchstart', startDrag);
        document.addEventListener('touchmove', drag);
        document.addEventListener('touchend', stopDrag);

        // --- BOTTOM TAB NAVIGATION ---
        function switchView(view, tabEl) {
            body.className = `view-${view}`;
            if (currentTheme === 'light') body.classList.add('light-theme');
            
            // Set Active Tab
            document.querySelectorAll('.tab-item').forEach(el => el.classList.remove('active'));
            tabEl.classList.add('active');
            
            renderData();
        }

        // --- DATA INTERACTION (CRUD) ---
        function addNote(type) {
            const inputEl = document.getElementById(`${type}-input`);
            const text = inputEl.value.trim();
            if (!text) return;

            const dateStr = new Date().toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
            
            tasks.push({ id: Date.now(), type, text, date: dateStr });
            inputEl.value = '';
            
            saveData();
            renderData();
        }

        function checkTask(id) {
            tasks = tasks.filter(t => t.id !== id);
            saveData();
            renderData();
        }

        function saveData() {
            localStorage.setItem('entj_tasks_v2', JSON.stringify(tasks));
        }

        // --- RENDER FUNCTIONS ---
        function renderData() {
            const survivalList = document.getElementById('survival-list');
            const commanderList = document.getElementById('commander-list');
            const boardGrid = document.getElementById('board-grid');
            const historyList = document.getElementById('history-list');

            // Clear Views
            survivalList.innerHTML = '';
            commanderList.innerHTML = '';
            boardGrid.innerHTML = '';
            historyList.innerHTML = '';

            tasks.forEach(task => {
                const cardHtml = `
                    <li class="task-card">
                        <div class="task-content">
                            <p class="task-text">${task.text}</p>
                            <span class="task-date">${task.date}</span>
                        </div>
                        <button class="btn-check" onclick="checkTask(${task.id})">✓</button>
                    </li>`;

                // Render in Split Panels
                if (task.type === 'survival') survivalList.innerHTML += cardHtml;
                if (task.type === 'commander') commanderList.innerHTML += cardHtml;

                // Render in Board Grid (Creative vs Tech)
                const boardTag = task.type === 'survival' ? '<span class="board-tag tag-creative">Creative</span>' : '<span class="board-tag tag-tech">Tech</span>';
                boardGrid.innerHTML += `
                    <div class="board-card">
                        <p class="board-text">${task.text}</p>
                        ${boardTag}
                    </div>`;
                    
                // Render in History (v50)
                historyList.innerHTML += cardHtml;
            });
        }

        // INIT
        renderData();

    </script>
</body>
</html>
